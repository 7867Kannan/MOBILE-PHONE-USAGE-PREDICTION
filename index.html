<!DOCTYPE html>
<html>
<head>
    <title>Mobile Usage Analyzer</title>

    <style>
        body{
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(120deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .card{
            background:white;
            width:380px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:15px;
            color:#444;
        }

        input{
            width:100%;
            padding:10px;
            margin:7px 0;
            border-radius:10px;
            border:1px solid #ccc;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#667eea;
            box-shadow:0 0 5px rgba(102,126,234,0.6);
        }

        button{
            margin-top:10px;
            width:100%;
            padding:12px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4a63d9;
            transform:scale(1.02);
            box-shadow:0 5px 12px rgba(0,0,0,0.2);
        }

        .output{
            margin-top:15px;
            padding:10px;
            background:#f1f1f1;
            border-radius:10px;
        }

        #result{
            color:#222;
            font-weight:bold;
            font-size:18px;
        }

        #most-used{
            color:#555;
            margin-top:5px;
        }

        #error{
            color:red;
            font-weight:bold;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>📱 Mobile Addiction Predictor</h2>

    <input type="number" id="total" placeholder="Total usage (hrs)">
    <input type="number" id="social" placeholder="Social Media (hrs)">
    <input type="number" id="study" placeholder="Study (hrs)">
    <input type="number" id="entertainment" placeholder="Entertainment (hrs)">
    <input type="number" id="gaming" placeholder="Gaming (hrs)">

    <button onclick="predict()">Predict Addiction Level</button>

    <div id="error"></div>

    <div class="output">
        <div id="result"></div>
        <div id="most-used"></div>
    </div>

</div>

<script>
async function predict() {
    const total = Number(document.getElementById("total").value);
    const social = Number(document.getElementById("social").value);
    const study = Number(document.getElementById("study").value);
    const entertainment = Number(document.getElementById("entertainment").value);
    const gaming = Number(document.getElementById("gaming").value);

    const sum = social + study + entertainment + gaming;

    // Validation: total hours must not exceed 24
    if(sum > 24 || total > 24){
        document.getElementById("error").innerText = 
            "Error: Total hours or sum of all categories cannot exceed 24!";
        document.getElementById("result").innerText = "";
        document.getElementById("most-used").innerText = "";
        return;
    } else {
        document.getElementById("error").innerText = "";
    }

    const data = { total, social, study, entertainment, gaming };

    const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const out = await res.json();

    document.getElementById("result").innerText =
        "Prediction: " + out.prediction;

    document.getElementById("most-used").innerText =
        "Most used category: " + out.most_used;
}
</script>

</body>
</html>
